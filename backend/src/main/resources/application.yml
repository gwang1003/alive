# src/main/resources/application.yml

# 파일 업로드 설정
spring:
  # 시크릿은 application-secret.yml(.gitignore) 또는 환경변수로 주입.
  # optional 이라 파일이 없어도 환경변수만으로 기동 가능(배포 환경 대응).
  config:
    import: optional:application-secret.yml

  application:
    name: alive
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/alive}
    username: ${DATASOURCE_USERNAME:ojg}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update  # ?? ??? update, ????? validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 이메일 발송 (Gmail SMTP)
  # 앱 비밀번호: Google 계정 > 보안 > 2단계 인증 활성화 > 앱 비밀번호 발급.
  # 발급받은 16자리를 환경변수 MAIL_PASSWORD로 주입(권장)하거나 아래 password에 직접 입력.
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:gwang1003@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT ??
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000      # 15분 (15 * 60 * 1000)
  refresh-token-expiration: 604800000  # 7일 (7 * 24 * 60 * 60 * 1000)

server:
  port: ${PORT:8282}

  # 파일 저장 경로 (배포 환경에선 UPLOAD_DIR 환경변수로 Linux 경로 지정)
file:
  upload-dir: ${UPLOAD_DIR:D:/alive/uploads}

# 토스페이먼츠 (키는 시크릿 파일/환경변수로 주입 — 현재 테스트 키)
toss:
  client-key: ${TOSS_CLIENT_KEY}
  secret-key: ${TOSS_SECRET_KEY}
  confirm-url: https://api.tosspayments.com/v1/payments/confirm

# 프론트엔드 주소 (소셜 로그인 완료 후 리다이렉트할 곳)
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# 소셜 로그인 - client-id/secret은 시크릿 파일/환경변수로 주입.
# 값이 비어있는 동안은 인가 URL 생성 단계에서 명확한 에러를 던짐.
oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8282/api/auth/oauth/kakao/callback}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:8282/api/auth/oauth/naver/callback}
