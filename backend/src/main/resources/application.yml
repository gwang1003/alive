# src/main/resources/application.yml

# 파일 업로드 설정
spring:
  application:
    name: alive
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://localhost:5432/alive
    username: ojg
    password: ***REMOVED***
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update  # ?? ??? update, ????? validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 이메일 발송 (Gmail SMTP)
  # 앱 비밀번호: Google 계정 > 보안 > 2단계 인증 활성화 > 앱 비밀번호 발급.
  # 발급받은 16자리를 환경변수 MAIL_PASSWORD로 주입(권장)하거나 아래 password에 직접 입력.
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:gwang1003@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT ??
jwt:
  secret: ***REMOVED***
  access-token-expiration: 900000      # 15분 (15 * 60 * 1000)
  refresh-token-expiration: 604800000  # 7일 (7 * 24 * 60 * 60 * 1000)

server:
  port: 8282

  # 파일 저장 경로
file:
  upload-dir: D:/alive/uploads

# 토스페이먼츠 (현재 테스트 키 - 문서 공개 테스트 키, 실결제 불가)
toss:
  client-key: ***REMOVED***
  secret-key: ***REMOVED***
  confirm-url: https://api.tosspayments.com/v1/payments/confirm

# 프론트엔드 주소 (소셜 로그인 완료 후 리다이렉트할 곳)
app:
  frontend-url: http://localhost:3000

# 소셜 로그인 - 카카오/네이버 개발자센터에서 앱 등록 후 발급받은 키로 교체해야 실제로 동작함.
# client-id/secret이 비어있는 동안은 인가 URL 생성 단계에서 명확한 에러를 던짐.
oauth:
  kakao:
    client-id: ***REMOVED***
    client-secret: ***REMOVED***
    redirect-uri: http://localhost:8282/api/auth/oauth/kakao/callback
  naver:
    client-id: ***REMOVED***
    client-secret: ***REMOVED***
    redirect-uri: http://localhost:8282/api/auth/oauth/naver/callback
